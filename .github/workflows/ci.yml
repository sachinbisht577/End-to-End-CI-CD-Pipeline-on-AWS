name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t devops-app .

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region --region ap-south-1 | \
        docker login -- AWS --password-stdin sachin-id.dkr.ecr.ap-south-1.amazonaws.com

    - name: Push Image
      run: |
        docker tag devops-app:latest fake-account-id.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latest
        docker push sachin-id.dkr.ecr.ap-south-1.amazonaws.com/devops-app:latest
